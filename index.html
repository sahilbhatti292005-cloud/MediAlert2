
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAlert - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">MediAlert</h1>
            <p class="text-slate-500 mt-2">Your personal medicine reminder</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="flex gap-4 p-1 bg-slate-100 rounded-2xl mb-8">
                <button id="showLogin" class="flex-1 py-2.5 rounded-xl font-bold transition-all bg-white shadow-sm text-blue-600">Login</button>
                <button id="showRegister" class="flex-1 py-2.5 rounded-xl font-bold transition-all text-slate-500">Register</button>
            </div>

            <form id="authForm" class="space-y-6">
                <div id="nameField" class="space-y-2 hidden">
                    <label class="text-sm font-semibold text-slate-700">Full Name</label>
                    <input type="text" id="name" class="input-field" placeholder="John Doe">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Email Address</label>
                    <input type="email" id="email" class="input-field" placeholder="john@example.com" required>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95 mt-4">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { loginUser, registerUser, checkAuth } from './js/auth.js';

        const authForm = document.getElementById('authForm');
        const showLogin = document.getElementById('showLogin');
        const showRegister = document.getElementById('showRegister');
        const nameField = document.getElementById('nameField');
        const submitBtn = document.getElementById('submitBtn');

        let isLogin = true;

        // Redirect if already logged in
        checkAuth((user) => {
            if (user) window.location.href = 'dashboard.html';
        });

        showLogin.addEventListener('click', () => {
            isLogin = true;
            nameField.classList.add('hidden');
            submitBtn.innerText = 'Sign In';
            showLogin.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            showLogin.classList.remove('text-slate-500');
            showRegister.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            showRegister.classList.add('text-slate-500');
        });

        showRegister.addEventListener('click', () => {
            isLogin = false;
            nameField.classList.remove('hidden');
            submitBtn.innerText = 'Create Account';
            showRegister.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            showRegister.classList.remove('text-slate-500');
            showLogin.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            showLogin.classList.add('text-slate-500');
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (isLogin) {
                loginUser(email, password);
            } else {
                registerUser(email, password);
            }
        });
    </script>
</body>
</html>
