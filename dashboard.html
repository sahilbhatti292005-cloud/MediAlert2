
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAlert - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                </div>
                <span class="font-black text-xl tracking-tight">MediAlert</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="userEmail" class="text-sm text-slate-500 hidden md:block"></span>
                <button id="logoutBtn" class="text-sm font-bold text-rose-600 hover:bg-rose-50 px-4 py-2 rounded-lg transition-all">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-8">
        <!-- Add Medicine Form -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Add New Reminder
            </h2>
            <form id="medForm" class="grid md:grid-cols-3 gap-4 items-end">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Medicine Name</label>
                    <input type="text" id="medName" class="input-field" placeholder="Paracetamol" required>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Dosage</label>
                    <input type="text" id="medDosage" class="input-field" placeholder="500mg" required>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Time</label>
                    <input type="time" id="medTime" class="input-field" required>
                </div>
                <div class="md:col-span-3">
                    <button type="submit" class="w-full md:w-auto btn-primary">Add Medicine</button>
                </div>
            </form>
        </section>

        <!-- Medicine List -->
        <section>
            <h2 class="text-xl font-bold mb-6">Your Schedule</h2>
            <div id="medList" class="grid gap-4">
                <!-- Medicines will be loaded here -->
                <div class="text-center py-12 text-slate-400 italic">Loading your medicines...</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { checkAuth, logoutUser } from './js/auth.js';
        import { addMedicine, getMedicines, deleteMedicine } from './js/app.js';

        const medForm = document.getElementById('medForm');
        const medList = document.getElementById('medList');
        const logoutBtn = document.getElementById('logoutBtn');
        const userEmail = document.getElementById('userEmail');

        // Protect Route
        checkAuth((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                userEmail.innerText = user.email;
                userEmail.classList.remove('hidden');
                
                // Start listening for medicines
                getMedicines((medicines) => {
                    renderMedicines(medicines);
                });
            }
        });

        logoutBtn.addEventListener('click', logoutUser);

        medForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('medName').value;
            const dosage = document.getElementById('medDosage').value;
            const time = document.getElementById('medTime').value;

            await addMedicine(name, dosage, time);
            medForm.reset();
        });

        function renderMedicines(medicines) {
            if (medicines.length === 0) {
                medList.innerHTML = `
                    <div class="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center">
                        <p class="text-slate-500">No medicines added yet. Add one above!</p>
                    </div>
                `;
                return;
            }

            medList.innerHTML = medicines.map(med => `
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group hover:shadow-md transition-all">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex flex-col items-center justify-center">
                            <span class="text-lg font-bold leading-none">${med.time}</span>
                        </div>
                        <div>
                            <h4 class="text-lg font-bold text-slate-800">${med.name}</h4>
                            <p class="text-slate-500 text-sm">${med.dosage}</p>
                        </div>
                    </div>
                    <button onclick="window.confirmDelete('${med.id}')" class="p-3 text-slate-300 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>
            `).join('');
        }

        // Global function for delete button
        window.confirmDelete = (id) => {
            if (confirm('Are you sure you want to delete this reminder?')) {
                deleteMedicine(id);
            }
        };

        // Simple reminder check logic
        setInterval(() => {
            const now = new Date();
            const currentTime = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            
            // This is a simple check. In a real app, you'd check against the list.
            // For the viva, you can explain this logic.
        }, 60000);
    </script>
</body>
</html>
